{% extends "base.html" %}

{% block content %}
<section class="card" style="max-width: 520px; margin: 0 auto;">
    <h2>Iniciar sesión</h2>
    <p>Acceso a la app EPI-UCSG.</p>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>
            {{ form.email.label }}
            {{ form.email(placeholder="admin@ucsg.edu.ec") }}
        </label>
        <label>
            {{ form.password.label }}
            {{ form.password(placeholder="Tu contraseña") }}
        </label>
        {{ form.submit(class_="button") }}
    </form>
</section>
{% endblock %}
