services:
  web:
    build: .
    container_name: epi-ucsg-web
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      SESSION_LIFETIME_MINUTES: ${SESSION_LIFETIME_MINUTES:-120}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-memory://}
    ports:
      - "${APP_PORT:-8200}:8000"
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - red_editorial

networks:
  red_editorial:
    external: true
